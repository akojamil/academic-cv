# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: About
    url: /
    weight: 10
  - name: Group Members
    url: group-members/
    weight: 20
  - name: Research
    url: projects/
    weight: 30
  - name: Publications
    url: publications/
    weight: 35
  - name: Teaching
    url: courses/
    weight: 40
  - name: Outreach
    url: events/
    weight: 50
  - name: News
    url: /#news
    weight: 60
  - name: Contact
    url: contact/
    weight: 70
