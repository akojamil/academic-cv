bio: |
  Before coming to CSU I was a Robert Dicke Postdoctoral Fellow in the Physics Department at Princeton University and I worked with Prof. Cristiano Galbiati on the upcoming DarkSide-20k experiment, searching for WIMP dark matter with a multi-tonne liquid argon target. Prior to that, I was working as a PhD student at Wright Lab at Yale University together with Prof. David Moore on the EXO-200 and nEXO experiments, searching for the neutrinoless double beta decay of Xe-136.

